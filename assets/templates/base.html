<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Sigma Tactical Group{% endblock %}</title>

    <link rel="icon" type="image/png" sizes="32x32" href="/static/sigma-favicon-32.png" />

    <link rel="stylesheet" href="/static/vendor/bootstrap-5.3.3/bootstrap.min.css" />
    <link rel="stylesheet" href="/static/css/site.css" />
    <link rel="stylesheet" href="/static/css/sigma-dial.css" />
    {% block extra_head %}{% endblock %}
  </head>

  <body>
    <nav class="navbar navbar-expand">
      <div class="container d-flex align-items-center">
        <a class="navbar-brand" href="/">
          <img src="/static/sigma-favicon-32.png" alt="" />
          <span class="brand-wordmark">{% block brand %}Sigma Tactical Group{% endblock %}</span>
        </a>
        <div class="ms-auto">
          {% block nav_actions %}{% endblock %}
        </div>
      </div>
    </nav>

    <main class="{% block main_class %}{% endblock %}">
      <div class="page-bg" aria-hidden="true">
        <div class="hero-bg">
          <div id="sigma-dial-root"></div>
        </div>
        <div class="sigma-bg">
          <svg class="sigma-bg-mark" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
              <radialGradient id="emberGlow" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ff8a3a" stop-opacity="1" />
                <stop offset="22%" stop-color="#ff3a00" stop-opacity="0.85" />
                <stop offset="55%" stop-color="#d40000" stop-opacity="0.34" />
                <stop offset="100%" stop-color="#900000" stop-opacity="0" />
              </radialGradient>
            </defs>
            <path d="M88.00 10.00 L -2.81 10.00 L 47.19 50.00 L -2.81 90.00 L 88.00 90.00 L 88.00 74.00 L 87.66 72.07 L 87.11 70.29 L 86.36 68.68 L 85.40 67.22 L 84.23 65.93 L 82.86 64.79 L 81.28 63.82 L 79.50 63.00 L 71.00 74.00 L 42.81 74.00 L 72.81 50.00 L 42.81 26.00 L 71.00 26.00 L 79.50 37.00 L 81.28 36.18 L 82.86 35.21 L 84.23 34.07 L 85.40 32.77 L 86.36 31.32 L 87.11 29.71 L 87.66 27.93 L 88.00 26.00 Z" fill="#525a63" />
            <g id="sigma-eye-glow">
              <circle id="sigma-eye-core" cx="66" cy="36" r="11" fill="url(#emberGlow)" />
              <circle cx="66" cy="36" r="4.2" fill="url(#emberGlow)" />
              <circle cx="66" cy="36" r="2.4" fill="#ff1e00" fill-opacity="0.55" />
              <circle cx="66" cy="36" r="1.05" fill="#ffcf86" />
            </g>
          </svg>
        </div>
      </div>
      <div class="page-foreground">
        {% block content %}{% endblock %}
      </div>
    </main>

    <script src="/static/js/sigma-dial.js" defer></script>
    {% block extra_scripts %}{% endblock %}

    <footer>
      <div class="container">
        <div class="footer-copyright">&copy; {{ copyright_years }} Sigma Tactical Group. All rights reserved.</div>
      </div>
    </footer>
  </body>
</html>
