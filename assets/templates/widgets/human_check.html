{# Proof-of-work human check (ALTCHA v3). Load CSS + altcha.js once per page. #}
{% if human_check_enabled %}
<link rel="stylesheet" href="/static/vendor/altcha/altcha.css" />
<div class="human-check-shell mb-3" aria-live="polite">
  <altcha-widget
    challenge="{{ human_check_challenge_url|safe }}"
    auto="onsubmit"
    hidefooter
    hidelogo
  ></altcha-widget>
</div>
{% endif %}
